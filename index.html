  <h1>🔒 合言葉を入力してください</h1>
  <input id="pw" type="password" placeholder="合言葉" autofocus onkeydown="if(event.key==='Enter')go()">
  <button onclick="go()">表示する</button>
  <div id="err"></div>
</div>
<script>
const b2u=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
const G=document.getElementById('gate');
async function go(){
  const pw=document.getElementById('pw').value, err=document.getElementById('err');
  err.textContent='復号中…';
  try{
    const enc=new TextEncoder();
    const salt=b2u(G.dataset.salt), iv=b2u(G.dataset.iv), ct=b2u(G.dataset.ct);
    const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:parseInt(G.dataset.iter),hash:'SHA-256'},
                 km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
    const html=new TextDecoder().decode(pt);
    document.open();document.write(html);document.close();
  }catch(e){ err.textContent='合言葉が違います'; }
}
</script></body></html>
